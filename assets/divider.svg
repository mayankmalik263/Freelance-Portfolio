<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 24" width="100%" height="24">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#09090b" stop-opacity="0"/>
      <stop offset="15%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="85%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </linearGradient>
    <filter id="divGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="0" y1="12" x2="900" y2="12" stroke="url(#divGrad)" stroke-width="2" filter="url(#divGlow)"/>
  <rect x="435" y="6" width="30" height="12" rx="4" fill="#09090b" stroke="#06b6d4" stroke-width="1"/>
  <circle cx="450" cy="12" r="3" fill="#22c55e"/>
</svg>
